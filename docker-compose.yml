version: '3.9'

services:
  aegis-imint:
    build: .
    container_name: aegis-imint
    ports:
      - "8501:8501"
    volumes:
      - ./base_de_datos:/app/base_de_datos
      - ./imagenes:/app/imagenes
      - ./modelos:/app/modelos
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
    driver: local
